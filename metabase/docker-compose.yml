services:
  metabase:
    # Pinned (not :latest) so a pull never silently jumps a major version.
    image: metabase/metabase:v0.59.13
    container_name: metabase
    restart: unless-stopped

    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase
      - MB_DB_PORT=5432
      - MB_DB_USER=metabase
      - MB_DB_PASS=${METABASE_DB_PASSWORD}
      - MB_DB_HOST=postgres
      # Web server port. Moved off the 3000 default so a legacy metabase on 3000
      # can keep running during data migration; tunnel/Caddy must target :3333.
      - MB_JETTY_PORT=3333
      - MB_ENCRYPTION_SECRET_KEY=${METABASE_SECRET_KEY}
      # Canonical site URL — must match how you expose metabase (see README "Gateway"):
      #   OPTION A (Caddy + Authelia):  - MB_SITE_URL=https://${DOMAIN}/metabase
      #   OPTION B (Cloudflare Tunnel): - MB_SITE_URL=https://${METABASE_HOSTNAME}
      # Option B is active below; switch the line to use Option A.
      - MB_SITE_URL=https://${METABASE_HOSTNAME}
      - MB_ENABLE_PUBLIC_SHARING=true
      - MB_ENABLE_EMBEDDING=true
      # App-DB (metadata) connection pool. Default 15 saturates under afternoon
      # peak concurrency (15/15 full → streaming queries stall); 30 has headroom.
      - MB_APPLICATION_DB_MAX_CONNECTION_POOL_SIZE=30
      # Heap sized for real workloads. Lower (e.g. -Xms512m -Xmx2g) on a small VPS.
      - JAVA_OPTS=-Xms2g -Xmx4g

    volumes:
      - ${DATA_DIR:-~/docker-data}/metabase:/metabase-data

    # postgres must be running (started separately)

    networks:
      - proxy

networks:
  proxy:
    external: true
