services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped

    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase
      - MB_DB_PORT=5432
      - MB_DB_USER=metabase
      - MB_DB_PASS=${METABASE_DB_PASSWORD}
      - MB_DB_HOST=postgres
      - MB_ENCRYPTION_SECRET_KEY=${METABASE_SECRET_KEY}
      - MB_SITE_URL=https://${DOMAIN}/metabase
      - MB_ENABLE_PUBLIC_SHARING=true
      - MB_ENABLE_EMBEDDING=true
      - JAVA_OPTS=-Xms512m -Xmx2g

    volumes:
      - ${DATA_DIR:-~/docker-data}/metabase:/metabase-data

    # postgres must be running (started separately)

    networks:
      - proxy

networks:
  proxy:
    external: true
