services:
  forge-db:
    image: postgres:16-alpine
    container_name: forge-db
    restart: unless-stopped

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    environment:
      - POSTGRES_USER=forgejo
      - POSTGRES_PASSWORD=${FORGE_DB_PASSWORD}
      - POSTGRES_DB=forgejo

    volumes:
      - ${DATA_DIR:-~/docker-data}/forge-db/pgdata:/var/lib/postgresql/data

    networks:
      - forge-internal

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgejo -d forgejo"]
      interval: 10s
      timeout: 5s
      retries: 5

  forge:
    image: codeberg.org/forgejo/forgejo:15
    container_name: forge
    hostname: forge
    restart: unless-stopped
    depends_on:
      forge-db:
        condition: service_healthy

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # Caddy reverse proxy handles HTTPS. SSH disabled (HTTPS git only).
    expose:
      - "3000"

    environment:
      # Run as host user (1000:100) — volume permission alignment
      - USER_UID=1000
      - USER_GID=100

      # Server — path-based sub-path mode under /forge/
      # ROOT_URL is the external URL Forgejo uses for clone links, OAuth, etc.
      # Caddy strips the /forge prefix; Forgejo listens at root inside the container.
      - FORGEJO__server__DOMAIN=${DOMAIN}
      - FORGEJO__server__ROOT_URL=https://${DOMAIN}/forge/
      - FORGEJO__server__HTTP_PORT=3000
      - FORGEJO__server__DISABLE_SSH=true
      - FORGEJO__server__LFS_START_SERVER=true

      # Database
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=forge-db:5432
      - FORGEJO__database__NAME=forgejo
      - FORGEJO__database__USER=forgejo
      - FORGEJO__database__PASSWD=${FORGE_DB_PASSWORD}

      # Service — closed instance: no public signup, admin-only user creation
      - FORGEJO__service__DISABLE_REGISTRATION=true
      - FORGEJO__service__REQUIRE_SIGNIN_VIEW=false
      - FORGEJO__service__ENABLE_NOTIFY_MAIL=false
      - FORGEJO__openid__ENABLE_OPENID_SIGNIN=false
      - FORGEJO__openid__ENABLE_OPENID_SIGNUP=false

      # Webhook — only allow internal endpoints for v1; extend explicitly if needed.
      - FORGEJO__webhook__ALLOWED_HOST_LIST=private,loopback

      # Security note:
      # Do NOT set INSTALL_LOCK here. Wizard writes it to app.ini on first boot;
      # forcing INSTALL_LOCK=false via env after install causes a crash loop
      # ("installed but unlocked" contradiction). SECRET_KEY / INTERNAL_TOKEN /
      # JWT_SECRET are generated by the wizard into app.ini.

      # Logging
      - FORGEJO__log__MODE=console
      - FORGEJO__log__LEVEL=info

      - TZ=Asia/Seoul

    volumes:
      - ${DATA_DIR:-~/docker-data}/forge/data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

    networks:
      - forge-internal
      - proxy

networks:
  forge-internal:
    driver: bridge
  proxy:
    external: true
