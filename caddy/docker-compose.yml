services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DATA_DIR:-~/docker-data}/caddy/data:/data
      - ${DATA_DIR:-~/docker-data}/caddy/config:/config

    networks:
      - proxy

networks:
  proxy:
    external: true
