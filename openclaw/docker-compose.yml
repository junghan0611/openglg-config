services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-custom:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    init: true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # IPv6 비활성화 (Oracle Cloud fetch 실패 방지)
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    dns:
      - 8.8.8.8
      - 8.8.4.4

    # SSH 터널 전용 (외부 노출 안 함)
    ports:
      - "127.0.0.1:18789:18789"

    env_file: .env

    environment:
      - HOME=/home/node
      - TERM=xterm-256color

    command: ["node", "openclaw.mjs", "gateway", "--bind", "lan", "--port", "18789"]

    volumes:
      - ./config:/home/node/.openclaw
      # Obsidian vault (read-only)
      - ${VAULT_PATH:-/home/ubuntu/vault}:/home/node/vault:ro

    networks:
      - proxy

networks:
  proxy:
    external: true
